<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% if page.tab_title %}
    <title>{{ page.tab_title }} | {{ site.title }}</title>
    {% seo title=false %}
    {% else %}
    {% seo %}
    {% endif %}
    {% if page.url == "/" %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Scholar Sun",
      "url": "{{ site.url }}/",
      "image": "{{ '/assets/images/profile.png' | absolute_url }}",
      "email": "mailto:scholarsun99@gmail.com",
      "jobTitle": "PhD Student in Operations Research",
      "affiliation": {
        "@type": "CollegeOrUniversity",
        "name": "Georgia Institute of Technology"
      },
      "alumniOf": [
        { "@type": "CollegeOrUniversity", "name": "University of British Columbia" },
        { "@type": "CollegeOrUniversity", "name": "University of Waterloo" }
      ],
      "knowsAbout": ["Continuous optimization", "Derivative-free optimization", "Operations research"],
      "sameAs": [
        "https://github.com/scholarsun"
      ]
    }
    </script>
    {% endif %}

    <link rel="icon" type="image/png" href="/assets/images/favicon/favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="shortcut icon" href="/assets/images/favicon/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
    <script>
      (function () {
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        function updateFavicon() {
          var old = document.querySelectorAll('link[rel~="icon"]');
          for (var i = 0; i < old.length; i++) { old[i].parentNode.removeChild(old[i]); }
          var link = document.createElement("link");
          link.rel = "icon";
          link.type = "image/png";
          link.setAttribute("sizes", "96x96");
          link.href = mq.matches
            ? "/assets/images/favicon/favicon-96x96-dark.png?v=2"
            : "/assets/images/favicon/favicon-96x96.png?v=2";
          document.head.appendChild(link);
        }
        updateFavicon();
        if (mq.addEventListener) { mq.addEventListener("change", updateFavicon); }
      })();
    </script>

    {% feed_meta %}
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
    <link type="text/css" rel="stylesheet" href="/assets/vendor/lightgallery/css/lightgallery-bundle.css" />
</head>
