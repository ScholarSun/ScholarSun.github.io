<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <link rel="icon" type="image/png" href="/assets/images/favicon/favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="shortcut icon" href="/assets/images/favicon/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
    <script>
      (function () {
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        function updateFavicon() {
          var old = document.querySelectorAll('link[rel~="icon"]');
          for (var i = 0; i < old.length; i++) { old[i].parentNode.removeChild(old[i]); }
          var link = document.createElement("link");
          link.rel = "icon";
          link.type = "image/png";
          link.setAttribute("sizes", "96x96");
          link.href = mq.matches
            ? "/assets/images/favicon/favicon-96x96-dark.png?v=2"
            : "/assets/images/favicon/favicon-96x96.png?v=2";
          document.head.appendChild(link);
        }
        updateFavicon();
        if (mq.addEventListener) { mq.addEventListener("change", updateFavicon); }
      })();
    </script>

    <link href='{{ site.baseurl }}/feed.xml' rel='alternate' type='application/atom+xml'>
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
    <link type="text/css" rel="stylesheet" href="/assets/vendor/lightgallery/css/lightgallery-bundle.css" />
</head>
